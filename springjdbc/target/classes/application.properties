spring.application.name=springjdbc
#The above line is optional

spring.datasource.url=jdbc:mysql://localhost:3306/mydb
spring.datasource.username=root
spring.datasource.password=Smp@9866357278
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Tells Spring which translator in our case its JDBC Driver to use to communicate with MySQL.
#Different databases speak different "dialects." This driver ensures your Java code is
#translated into commands MySQL understands.

spring.jpa.hibernate.ddl-auto=update
#Control DDL, update means Hibernate will compare our Java @Entity classes with the existing DB
#tables and make changes (like adding a column) automatically.
#spring.jpa.open-in-view=false
spring.jpa.show-sql=true
#Prints every SQL query Hibernate generates to your console/terminal.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#To change the port number should not used by any other service.
